[problem]
id = "search-001"
name = "Linear Search"
category = "searching"
difficulty = "easy"
source = "TheAlgorithms"
description = "Implement linear search to find the index of a target value in an array. Return -1 if not found."

[[test_cases]]
input = "[10, 20, 30, 40, 50], 30"
expected_output = "2"

[[test_cases]]
input = "[1, 2, 3, 4, 5], 6"
expected_output = "-1"

[[test_cases]]
input = "[], 1"
expected_output = "-1"

[[test_cases]]
input = "[7], 7"
expected_output = "0"

[[test_cases]]
input = "[5, 3, 7, 3, 9], 3"
expected_output = "1"
