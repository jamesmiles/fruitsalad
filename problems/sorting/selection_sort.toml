[problem]
id = "sort-002"
name = "Selection Sort"
category = "sorting"
difficulty = "easy"
source = "TheAlgorithms"
description = "Implement selection sort to sort an array of integers in ascending order by repeatedly finding the minimum element from the unsorted portion"

[[test_cases]]
input = "[64, 25, 12, 22, 11]"
expected_output = "[11, 12, 22, 25, 64]"

[[test_cases]]
input = "[]"
expected_output = "[]"

[[test_cases]]
input = "[3, 1, 2]"
expected_output = "[1, 2, 3]"

[[test_cases]]
input = "[5, 5, 5, 5]"
expected_output = "[5, 5, 5, 5]"
