[problem]
id = "sort-006"
name = "Heap Sort"
category = "sorting"
difficulty = "medium"
source = "TheAlgorithms"
description = "Implement heap sort to sort an array of integers in ascending order using a binary heap data structure"

[[test_cases]]
input = "[12, 11, 13, 5, 6, 7]"
expected_output = "[5, 6, 7, 11, 12, 13]"

[[test_cases]]
input = "[]"
expected_output = "[]"

[[test_cases]]
input = "[4, 10, 3, 5, 1]"
expected_output = "[1, 3, 4, 5, 10]"

[[test_cases]]
input = "[1]"
expected_output = "[1]"

[[test_cases]]
input = "[2, 1]"
expected_output = "[1, 2]"
