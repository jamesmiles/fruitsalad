[problem]
id = "sort-005"
name = "Quick Sort"
category = "sorting"
difficulty = "medium"
source = "TheAlgorithms"
description = "Implement quick sort to sort an array of integers in ascending order using a pivot-based partitioning strategy"

[[test_cases]]
input = "[10, 7, 8, 9, 1, 5]"
expected_output = "[1, 5, 7, 8, 9, 10]"

[[test_cases]]
input = "[]"
expected_output = "[]"

[[test_cases]]
input = "[3, 6, 8, 10, 1, 2, 1]"
expected_output = "[1, 1, 2, 3, 6, 8, 10]"

[[test_cases]]
input = "[1, 2, 3]"
expected_output = "[1, 2, 3]"

[[test_cases]]
input = "[9, 9, 9]"
expected_output = "[9, 9, 9]"
