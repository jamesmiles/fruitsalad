[problem]
id = "ds-004"
name = "Binary Search Tree"
category = "data_structures"
difficulty = "medium"
source = "Custom"
description = "Implement a binary search tree supporting insert, search, delete, and in-order traversal operations"

[[test_cases]]
input = "insert(5), insert(3), insert(7), insert(1), insert(4), inorder()"
expected_output = "[1, 3, 4, 5, 7]"

[[test_cases]]
input = "insert(10), insert(5), insert(15), search(5), search(8)"
expected_output = "search(5)=true, search(8)=false"

[[test_cases]]
input = "insert(5), insert(3), insert(7), delete(3), inorder()"
expected_output = "[5, 7]"

[[test_cases]]
input = "insert(5), insert(3), insert(7), insert(2), insert(4), delete(5), inorder()"
expected_output = "[2, 3, 4, 7]"
