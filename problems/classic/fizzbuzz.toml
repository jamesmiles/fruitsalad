[problem]
id = "classic-001"
name = "FizzBuzz"
category = "classic"
difficulty = "easy"
source = "Custom"
description = "Generate FizzBuzz output for numbers 1 to n. For multiples of 3 print 'Fizz', multiples of 5 print 'Buzz', multiples of both print 'FizzBuzz', otherwise print the number."

[[test_cases]]
input = "5"
expected_output = "[\"1\", \"2\", \"Fizz\", \"4\", \"Buzz\"]"

[[test_cases]]
input = "15"
expected_output = "[\"1\", \"2\", \"Fizz\", \"4\", \"Buzz\", \"Fizz\", \"7\", \"8\", \"Fizz\", \"Buzz\", \"11\", \"Fizz\", \"13\", \"14\", \"FizzBuzz\"]"

[[test_cases]]
input = "1"
expected_output = "[\"1\"]"

[[test_cases]]
input = "3"
expected_output = "[\"1\", \"2\", \"Fizz\"]"
