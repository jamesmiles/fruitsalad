[problem]
id = "classic-003"
name = "Towers of Hanoi"
category = "classic"
difficulty = "medium"
source = "Rosetta Code"
description = "Solve the Towers of Hanoi puzzle for n disks. Return the sequence of moves as a list of (source, destination) pairs, using pegs labeled A, B, and C."

[[test_cases]]
input = "1"
expected_output = "[(A, C)]"

[[test_cases]]
input = "2"
expected_output = "[(A, B), (A, C), (B, C)]"

[[test_cases]]
input = "3"
expected_output = "[(A, C), (A, B), (C, B), (A, C), (B, A), (B, C), (A, C)]"

[[test_cases]]
input = "4"
expected_output = "15 moves"
