[problem]
id = "graph-001"
name = "Dijkstra's Shortest Path"
category = "graph"
difficulty = "medium"
source = "Stony Brook"
description = "Implement Dijkstra's algorithm to find the shortest path distances from a source node to all other nodes in a weighted graph with non-negative edge weights"

[[test_cases]]
input = "edges=[(0,1,4), (0,2,1), (2,1,2), (1,3,1), (2,3,5)], source=0, nodes=4"
expected_output = "[0, 3, 1, 4]"

[[test_cases]]
input = "edges=[(0,1,1)], source=0, nodes=2"
expected_output = "[0, 1]"

[[test_cases]]
input = "edges=[], source=0, nodes=1"
expected_output = "[0]"

[[test_cases]]
input = "edges=[(0,1,7), (0,2,9), (0,5,14), (1,2,10), (1,3,15), (2,3,11), (2,5,2), (3,4,6), (4,5,9)], source=0, nodes=6"
expected_output = "[0, 7, 9, 20, 20, 11]"
