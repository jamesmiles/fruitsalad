[problem]
id = "graph-005"
name = "Topological Sort"
category = "graph"
difficulty = "medium"
source = "Stony Brook"
description = "Implement topological sort for a directed acyclic graph (DAG) represented as an adjacency list. Return a valid topological ordering of the nodes."

[[test_cases]]
input = "{0: [1, 2], 1: [3], 2: [3], 3: []}, nodes=4"
expected_output = "[0, 2, 1, 3]"

[[test_cases]]
input = "{0: [1], 1: [2], 2: []}, nodes=3"
expected_output = "[0, 1, 2]"

[[test_cases]]
input = "{0: []}, nodes=1"
expected_output = "[0]"

[[test_cases]]
input = "{0: [1, 2], 1: [], 2: [3], 3: [1]}, nodes=4"
expected_output = "[0, 2, 3, 1]"
