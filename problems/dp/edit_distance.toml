[problem]
id = "dp-004"
name = "Edit Distance"
category = "dp"
difficulty = "medium"
source = "LeetCode"
description = "Compute the minimum number of operations (insert, delete, replace) required to convert one string into another using dynamic programming"

[[test_cases]]
input = "\"horse\", \"ros\""
expected_output = "3"

[[test_cases]]
input = "\"intention\", \"execution\""
expected_output = "5"

[[test_cases]]
input = "\"\", \"\""
expected_output = "0"

[[test_cases]]
input = "\"abc\", \"abc\""
expected_output = "0"

[[test_cases]]
input = "\"abc\", \"\""
expected_output = "3"
