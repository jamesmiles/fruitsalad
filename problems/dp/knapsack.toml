[problem]
id = "dp-002"
name = "0/1 Knapsack"
category = "dp"
difficulty = "medium"
source = "Stony Brook"
description = "Solve the 0/1 knapsack problem: given a set of items each with a weight and value, determine the maximum total value that can be carried in a knapsack of a given capacity"

[[test_cases]]
input = "weights=[1, 2, 3], values=[6, 10, 12], capacity=5"
expected_output = "22"

[[test_cases]]
input = "weights=[2, 3, 4, 5], values=[3, 4, 5, 6], capacity=5"
expected_output = "7"

[[test_cases]]
input = "weights=[1, 1, 1], values=[10, 20, 30], capacity=2"
expected_output = "50"

[[test_cases]]
input = "weights=[10], values=[100], capacity=5"
expected_output = "0"

[[test_cases]]
input = "weights=[], values=[], capacity=10"
expected_output = "0"
