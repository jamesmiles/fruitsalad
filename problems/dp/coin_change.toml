[problem]
id = "dp-005"
name = "Coin Change"
category = "dp"
difficulty = "medium"
source = "LeetCode"
description = "Given a set of coin denominations and a target amount, find the minimum number of coins needed to make up that amount. Return -1 if it cannot be made."

[[test_cases]]
input = "coins=[1, 5, 10, 25], amount=30"
expected_output = "2"

[[test_cases]]
input = "coins=[1, 2, 5], amount=11"
expected_output = "3"

[[test_cases]]
input = "coins=[2], amount=3"
expected_output = "-1"

[[test_cases]]
input = "coins=[1], amount=0"
expected_output = "0"

[[test_cases]]
input = "coins=[1, 3, 4], amount=6"
expected_output = "2"
