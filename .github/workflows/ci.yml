name: Fruit Salad CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-local:
    name: Local Tests
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: make lint
        continue-on-error: true

      - name: Run tests (local harness)
        run: make test

      - name: Output reward signal
        if: always()
        run: make reward

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-local
          path: metrics/test_results.json
          if-no-files-found: ignore

  test-docker:
    name: Docker Tests
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Docker harness image
        run: docker build -t fruitsalad-harness:latest -f harness/hosted/Dockerfile .

      - name: Run tests (Docker harness)
        run: python3 tests/run_tests.py --harness docker --verbose --timeout 60

      - name: Output reward signal
        if: always()
        run: make reward

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-docker
          path: metrics/test_results.json
          if-no-files-found: ignore

  ffs-compiler:
    name: FFS Compiler Verification
    runs-on: self-hosted
    needs: test-local

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify ffs compiles and runs factorial
        run: |
          python3 -m fs ffs/compiler.fs > /tmp/ffs_output.py
          output=$(python3 /tmp/ffs_output.py)
          echo "ffs output: $output"
          [ "$output" = "3628800" ] && echo "PASS: ffs factorial" || (echo "FAIL" && exit 1)

      - name: Verify ffs compiles hello_world.fs
        run: |
          python3 -m fs ffs/compiler.fs tests/solutions/classic/hello_world.fs > /tmp/ffs_hello.py
          output=$(python3 /tmp/ffs_hello.py)
          echo "Output: $output"
          [ "$output" = "Hello, World!" ] && echo "PASS" || (echo "FAIL" && exit 1)
