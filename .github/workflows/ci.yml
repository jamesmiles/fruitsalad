name: Fruit Salad CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-local:
    name: Local Tests
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: make lint
        continue-on-error: true

      - name: Run tests (local harness)
        run: make test

      - name: Output reward signal
        if: always()
        run: make reward

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-local
          path: metrics/test_results.json
          if-no-files-found: ignore

  test-docker:
    name: Docker Tests
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Docker harness image
        run: docker build -t fruitsalad-harness:latest -f harness/hosted/Dockerfile .

      - name: Run tests (Docker harness)
        run: python3 tests/run_tests.py --harness docker --verbose --timeout 60

      - name: Output reward signal
        if: always()
        run: make reward

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-docker
          path: metrics/test_results.json
          if-no-files-found: ignore

  ffs-compiler:
    name: FFS Compiler Verification
    runs-on: self-hosted
    needs: test-local

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compare fs and ffs output on all compatible programs
        run: |
          pass=0; fail=0; errors=0; skip=0
          for f in tests/solutions/*/*.fs; do
            name=$(basename "$f" .fs)
            # Skip self-hosting tests (interpreter-in-interpreter too slow)
            if echo "$name" | grep -qE "self_hosting|ffs_factorial"; then
              skip=$((skip+1)); continue
            fi
            # Get fs output
            fs_out=$(timeout 10 python3 -m fs "$f" 2>/dev/null)
            if [ $? -ne 0 ]; then skip=$((skip+1)); continue; fi
            # Compile with ffs
            py_code=$(timeout 30 python3 -m fs ffs/compiler.fs "$f" 2>/dev/null)
            if [ $? -ne 0 ]; then
              echo "COMPILE_ERR: $name (expected for Bowl/Medley/Sort)"
              errors=$((errors+1)); continue
            fi
            # Run generated Python
            ffs_out=$(echo "$py_code" | timeout 10 python3 2>/dev/null)
            if [ $? -ne 0 ]; then
              echo "RUN_ERR: $name"
              fail=$((fail+1)); continue
            fi
            # Compare
            if [ "$fs_out" = "$ffs_out" ]; then
              pass=$((pass+1))
            else
              echo "MISMATCH: $name"
              fail=$((fail+1))
            fi
          done
          echo ""
          echo "FFS Results: $pass pass, $fail fail, $errors compile_err, $skip skipped"
          echo "Total compatible: $((pass + fail)) | Pass rate: $pass/$((pass + fail))"
          # Fail CI if any MISMATCH or RUN_ERR (compile errors are expected)
          [ $fail -eq 0 ] && echo "All compatible programs match!" || (echo "FAIL: $fail mismatches/errors" && exit 1)
