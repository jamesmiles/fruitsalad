name: Fruit Salad CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-local:
    name: Local Tests
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: make lint
        continue-on-error: true

      - name: Run tests (local harness)
        run: make test

      - name: Output reward signal
        if: always()
        run: make reward

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-local
          path: metrics/test_results.json
          if-no-files-found: ignore

  test-docker:
    name: Docker Tests
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Docker harness image
        run: docker build -t fruitsalad-harness:latest -f harness/hosted/Dockerfile .

      - name: Run tests (Docker harness)
        run: python3 tests/run_tests.py --harness docker --verbose --timeout 60

      - name: Output reward signal
        if: always()
        run: make reward

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-docker
          path: metrics/test_results.json
          if-no-files-found: ignore

  ffs-compiler:
    name: "FFS: ${{ matrix.group }}"
    runs-on: self-hosted
    needs: test-local
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        include:
          - group: classic
            dirs: tests/solutions/classic
          - group: math
            dirs: tests/solutions/math
          - group: sorting
            dirs: tests/solutions/sorting
          - group: searching
            dirs: tests/solutions/searching
          - group: dp
            dirs: tests/solutions/dp
          - group: strings
            dirs: tests/solutions/strings
          - group: data-structures
            dirs: tests/solutions/data_structures
          - group: graph
            dirs: tests/solutions/graph
          - group: type-system
            dirs: tests/solutions/type_system
          - group: other
            dirs: tests/solutions/concurrency tests/solutions/error_handling

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "FFS compare: ${{ matrix.group }}"
        run: bash tests/ffs_compare.sh ${{ matrix.dirs }}
